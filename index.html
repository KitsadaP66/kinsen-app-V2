        const generateEmptySchedule = () => {
            const schedule = {};
            const d = getCurrentDateObj();
            const year = d.getFullYear();
            const month = d.getMonth() + 1;
            const daysCount = getDaysInMonth(year, month);
            const ym = getCurrentYearMonth();
            
            employees.forEach(empName => {
                schedule[empName] = {};
                for(let i=1; i<=daysCount; i++) {
                    const dateStr = `${ym}-${i.toString().padStart(2, '0')}`;
                    schedule[empName][dateStr] = { status: "unknown", roleId: null };
                }
            });
            return schedule;
        };

        // GPS Distance Calculation (Haversine Formula)
        const calculateDistance = (lat1, lon1, lat2, lon2) => {
            const R = 6371e3; 
            const p1 = lat1 * Math.PI/180;
            const p2 = lat2 * Math.PI/180;
            const dp = (lat2-lat1) * Math.PI/180;
            const dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        };

            // พิกัดร้าน
            const shopLocation = { lat: 14.862949192655888, lng: 102.07131386662192 };
            const MAX_RADIUS_METERS = 100; // รัศมีที่อนุญาต

            useEffect(() => {
                if (currentTab !== 'clockin') {
                    stopCamera();
                    setClockInState('idle');
                }
            }, [currentTab]);

            const stopCamera = () => {
                if (streamRef.current) {
                    streamRef.current.getTracks().forEach(track => track.stop());
                    streamRef.current = null;
                }
            };

            // Fetch Schedule Data from Google Sheets CSV (ระบบวันที่อัตโนมัติ)
            useEffect(() => {
                const loadSchedule = async () => {
                    setIsLoading(true);
                    setParseError(false);
                    const currentYm = getCurrentYearMonth(); // ตัวแปรปี-เดือน ปัจจุบัน

                    Papa.parse(GOOGLE_SHEET_CSV_URL, {
                        download: true,
                        header: false,
                        complete: function(results) {
                            try {
                                const data = results.data;
                                if (!data || data.length === 0 || (data[0][0] && data[0][0].toString().includes("<html"))) {
                                    throw new Error("ลิงก์ไม่เปิดสาธารณะ หรือ เป็นไฟล์ HTML");
                                }

                                const newSchedule = {};
                                employees.forEach(e => newSchedule[e] = {});

                                let dateRowIdx = -1;
                                let dateCols = {};
                                
                                for (let i = 0; i < Math.min(15, data.length); i++) {
                                    let validDaysCount = 0;
                                    let tempCols = {};
                                    for (let c = 0; c < data[i].length; c++) {
                                        const cell = data[i][c]?.toString().trim();
                                        const num = parseInt(cell);
                                        if (num >= 1 && num <= 31 && cell === num.toString()) {
                                            const dayStr = num.toString().padStart(2, '0');
                                            // เปลี่ยนปี-เดือน ให้เป็นของเดือนปัจจุบันเสมอ
                                            tempCols[c] = `${currentYm}-${dayStr}`;
                                            validDaysCount++;
                                        }
                                    }
                                    if (validDaysCount >= 15) {
                                        dateRowIdx = i;
                                        dateCols = tempCols;
                                        break;
                                    }
                                }

                                if (dateRowIdx !== -1) {
                                    employees.forEach(emp => {
                                        Object.values(dateCols).forEach(dateStr => {
                                            newSchedule[emp][dateStr] = { status: "unknown", roleId: null };
                                        });
                                    });

                                    for (let i = 0; i < data.length; i++) {
                                        const combinedHeader = (data[i][0]?.toString().trim() || "") + " " + (data[i][1]?.toString().trim() || ""); 
                                        let roleId = null;

                                        if (combinedHeader.includes("ลวก") || combinedHeader.includes("หน้าเตา") || combinedHeader.includes("ปรุง")) roleId = "role-1";
                                        else if (combinedHeader.includes("เสริฟ") || combinedHeader.includes("เสิร์ฟ") || combinedHeader.includes("น้ำ") || combinedHeader.includes("แคชเชียร์")) roleId = "role-2";
                                        else if (combinedHeader.includes("ผัด") || combinedHeader.includes("กระเพรา") || combinedHeader.includes("กะเพรา")) roleId = "role-3";
                                        else if (combinedHeader.includes("ล้าง") || combinedHeader.includes("จาน")) roleId = "role-4";

                                        if (roleId) {
                                            for (const col in dateCols) {
                                                const dateStr = dateCols[col];
                                                const assignedEmp = data[i][col]?.toString().trim() || "";
                                                
                                                employees.forEach(emp => {
                                                    if (assignedEmp.includes(emp)) {
                                                        newSchedule[emp][dateStr] = { status: "work", roleId: roleId };
                                                    }
                                                });
                                            }
                                        }
                                    }

                                    for (let i = 0; i < data.length; i++) {
                                        const col0 = data[i][0]?.toString().trim() || "";
                                        const col1 = data[i][1]?.toString().trim() || "";
                                        
                                        employees.forEach(emp => {
                                            if (col0 === emp || col1 === emp) {
                                                for (const col in dateCols) {
                                                    const dateStr = dateCols[col];
                                                    const cellValue = data[i][col]?.toString().trim().toUpperCase() || "";
                                                    
                                                    if (cellValue.includes("OFF") || cellValue.includes("หยุด")) {
                                                        newSchedule[emp][dateStr].status = "off";
                                                    } else if (cellValue.includes("ลา") || cellValue.includes("LEAVE")) {
                                                        newSchedule[emp][dateStr].status = "leave";
                                                    }
                                                }
                                            }
                                        }
                                    }

                                    setFullSchedule(newSchedule);
                                    setIsLoading(false);

                                }

            const formatDateThai = (dateStr) => {
                const d = new Date(dateStr);
                const months = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
                return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear() + 543}`;
            };

            // ==========================================
            // ส่งข้อมูลสต็อก (Google Sheets Webhook)
            // ==========================================
            const handleStockSubmit = async () => {
                if (Object.keys(stockInput).length === 0) {
                    alert("กรุณากรอกจำนวนสต็อกอย่างน้อย 1 รายการครับ");
                    return;
                }

                if (!STOCK_WEBHOOK_URL || STOCK_WEBHOOK_URL === "YOUR_STOCK_WEBHOOK_URL_HERE") {
                    alert("ระบบยังไม่ได้ตั้งค่า Webhook สำหรับสต็อก กรุณาติดต่อแอดมิน");
                    return;
                }

                setIsSendingStock(true);
                const userScheduleToday = fullSchedule[currentUser]?.[selectedDateStr] || {};
                const role = rolesData[userScheduleToday.roleId];
                const now = new Date();
                const timeString = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')} น.`;

                const payload = {
                    date: selectedDateStr,
                    time: timeString,
                    user: currentUser,
                    role: role.title,
                    stockData: stockInput
                };

                try {
                    const response = await fetch(STOCK_WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload)
                    });
                    
                    // Allow opaque response due to CORS in Google Apps Script
                    if (response.ok || response.type === 'opaque') {
                        alert("บันทึกสต็อกลงระบบเรียบร้อยแล้วครับ!");
                        setIsStockModalOpen(false);
                        setStockInput({}); 
                    } else {
                        throw new Error("Server Error");
                    }
                } catch (error) {
                    alert("ไม่สามารถบันทึกได้ กรุณาลองใหม่อีกครั้งครับ (อาจติดปัญหา CORS แต่ข้อมูลอาจจะเข้าชีตแล้ว)");
                }
                setIsSendingStock(false);
            };

            // AI Functions
            const generateAiResponse = async (promptQuery) => {
                const query = promptQuery || aiInput.trim();
                if (!query) return;
                
                setIsAiLoading(true);
                setAiResponse("");
                setAiInput("");
                
                const systemPrompt = `คุณคือ 'เจ๊เจ้าของร้านก๋วยเตี๋ยวเรือกินเส้น' ที่เก่ง แก้ปัญหาเฉพาะหน้าเก่ง และห่วงใยพนักงาน 
                หน้าที่ของคุณคือช่วยพนักงานร้าน (ชื่อ ${currentUser}) คิดคำพูดเพื่อเจรจากับลูกค้าเวลามีปัญหา 
                หรือช่วยคิดข้อความสรุปงาน กฎของร้านคือถ้าลูกค้าตำหนิจะโดนหัก 20-50 บาท ดังนั้นต้องช่วยให้สถานการณ์คลี่คลาย 
                - ขอคำพูดที่นำไปพูดกับลูกค้าได้เลย เน้นความสุภาพ อ่อนน้อม จริงใจ (มีคำลงท้าย ครับ/ค่ะ)
                - สั้น กระชับ เข้าใจง่าย 
                - ให้กำลังใจพนักงานสั้นๆ ตอนท้าย`;

                const payload = {
                    contents: [{ parts: [{ text: query }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] }
                };

                let retries = 0;
                while (retries < 3) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        const data = await response.json();
                        setAiResponse(data.candidates?.[0]?.content?.parts?.[0]?.text || "ขออภัยจ้ะ เจ๊ยุ่งอยู่ ลองถามใหม่นะ");
                        break; 
                    } catch (error) {
                        retries++;
                        if (retries >= 3) setAiResponse("เชื่อมต่อระบบ AI ไม่สำเร็จ กรุณาลองใหม่ภายหลังจ้ะ");
                        await new Promise(resolve => setTimeout(resolve, 1000 * retries));
                    }
                }
                setIsAiLoading(false);
                setTimeout(() => aiEndRef.current?.scrollIntoView({ behavior: "smooth" }), 100);
            };

            // Clock-In Functions
            const startClockInProcess = () => {
                setClockInState('checking_gps');
                
                if (!navigator.geolocation) {
                    setGpsErrorMsg('อุปกรณ์ของคุณไม่รองรับ GPS');
                    setClockInState('gps_error');
                    return;
                }

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const distance = calculateDistance(position.coords.latitude, position.coords.longitude, shopLocation.lat, shopLocation.lng);
                        if (distance <= MAX_RADIUS_METERS) {
                            openCamera();
                        } else {
                            setGpsErrorMsg(`คุณอยู่ห่างจากร้าน ${Math.round(distance)} เมตร (ต้องอยู่ในระยะ ${MAX_RADIUS_METERS} ม.)`);
                            setClockInState('gps_error');
                        }
                    },
                    (error) => {
                        setGpsErrorMsg('ไม่สามารถเข้าถึงตำแหน่งได้ กรุณาอนุญาตให้เว็บใช้ GPS');
                        setClockInState('gps_error');
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            };

            const openCamera = () => {
                setClockInState('camera_ready');
                navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
                    .then(stream => {
                        streamRef.current = stream;
                        if (videoRef.current) videoRef.current.srcObject = stream;
                    })
                    .catch(err => {
                        setGpsErrorMsg('ไม่สามารถเปิดกล้องได้ กรุณาอนุญาตการเข้าถึงกล้องในเบราว์เซอร์');
                        setClockInState('gps_error');
                    });
            };

            const captureAndSendToLine = async () => {
                if (videoRef.current) {
                    const video = videoRef.current;
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                    setCapturedImg(dataUrl);
                    stopCamera();
                    setClockInState('sending');

                    const now = new Date();
                    const timeString = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')} น.`;

                    try {
                        const response = await fetch(LINE_WEBHOOK_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                            body: JSON.stringify({ user: currentUser, time: timeString, image: dataUrl })
                        });
                        
                        if (response.ok || response.type === 'opaque') {
                            setClockInState('success');
                            localStorage.setItem(`clockin_${currentUser}_${getTodayStr()}`, timeString);
                        } else {
                            throw new Error("Server error");
                        }
                    } catch (error) {
                        setClockInState('success');
                        localStorage.setItem(`clockin_${currentUser}_${getTodayStr()}`, timeString);
                    }
                }
            };

            if (isLoading) {
                return (
                    <div className="app-container flex flex-col items-center justify-center h-screen text-wood-600 bg-[#fdfbf7]">
                        <i className="fa-solid fa-circle-notch fa-spin text-4xl mb-4"></i>
                        <p className="font-bold">กำลังอัปเดตข้อมูลตารางงาน...</p>
                    </div>
                );
            }

            if (!currentUser) {
                return (
                    <div className="app-container flex flex-col items-center justify-center p-6 bg-[url('https://images.unsplash.com/photo-1552566626-52f8b828add9?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center">
                        <div className="absolute inset-0 bg-wood-900/85 backdrop-blur-sm z-0"></div>
                        <div className="relative z-10 w-full max-w-sm bg-white rounded-3xl shadow-2xl p-8 text-center animate-[fadeIn_0.5s_ease-out]">
                            <div className="w-24 h-24 mx-auto bg-wood-700 rounded-2xl flex items-center justify-center mb-6 shadow-inner border-4 border-wood-100">
                                <i className="fa-solid fa-bowl-food text-5xl text-wood-100"></i>
                            </div>
                            <h1 className="text-2xl font-bold text-wood-800 mb-2">เข้าสู่ระบบพนักงาน</h1>
                            <p className="text-gray-500 text-sm mb-6">กรุณาเลือกชื่อของคุณ</p>
                            <div className="grid grid-cols-3 gap-3">
                                {employees.map(name => (
                                    <button 
                                        key={name} onClick={() => setCurrentUser(name)}
                                        className="bg-wood-50 hover:bg-wood-100 border border-wood-200 text-wood-800 font-medium py-3 rounded-xl transition-transform active:scale-95 flex flex-col items-center"
                                    >
                                        <i className="fa-solid fa-user text-gray-400 mb-1"></i>
                                        <span className="text-sm">{name}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            const userSchedule = fullSchedule[currentUser] || {};
            const currentDayData = userSchedule[selectedDateStr] || { status: "unknown", roleId: null };

            // Render Views ====================================

            // 1. หน้างานประจำวัน
            const renderDaily = () => {
                let content;
                if (currentDayData.status === "off" || currentDayData.status === "leave" || !currentDayData.roleId) {
                    content = (
                        <div className="flex flex-col items-center justify-center py-16 px-6 text-center bg-white rounded-2xl shadow-sm border border-gray-100 mt-4 animate-[fadeIn_0.3s_ease-out]">
                            <div className={`w-20 h-20 rounded-full flex items-center justify-center text-3xl mb-4 shadow-sm ${currentDayData.status === 'leave' ? 'bg-orange-100 text-orange-500' : 'bg-gray-100 text-gray-500'}`}>
                                <i className={`fa-solid ${currentDayData.status === 'leave' ? 'fa-bed-pulse' : (currentDayData.status === 'off' ? 'fa-mug-hot' : 'fa-calendar-xmark')}`}></i>
                            </div>
                            <h2 className="text-xl font-bold text-gray-800 mb-2">
                                {currentDayData.status === 'leave' ? 'คุณลางาน' : (currentDayData.status === 'off' ? 'วันนี้คุณได้พัก (OFF)' : 'ไม่มีข้อมูลตารางงาน')}
                            </h2>
                            <p className="text-gray-500 text-sm">ไม่มีรายการเช็คลิสต์ที่ต้องทำในวันนี้</p>
                        </div>
                    );
                } else {
                    const role = rolesData[currentDayData.roleId];
                    const progressTotal = role.tasks.length + sharedTasks.length;
                    const progressChecked = Object.values(checkedTasks).filter(Boolean).length;
                    const progressPercent = Math.round((progressChecked / progressTotal) * 100) || 0;

                    content = (
                        <div className="animate-[fadeIn_0.3s_ease-out] mt-4">
                            <div className={`${role.color} rounded-2xl p-5 text-white shadow-md mb-6 relative overflow-hidden flex justify-between items-center`}>
                                <i className={`fa-solid ${role.icon} absolute -right-2 -bottom-2 text-7xl opacity-20`}></i>
                                <div className="relative z-10">
                                    <span className="bg-white/20 px-3 py-1 rounded-full text-xs font-semibold">หน้าที่ประจำวัน</span>
                                    <h2 className="text-xl md:text-2xl font-bold mt-2 leading-tight">{role.title}</h2>
                                </div>
                                <div className="relative z-10 text-center bg-white/20 p-2 rounded-xl min-w-[60px]">
                                    <div className="text-xl font-bold">{progressPercent}%</div>
                                    <div className="text-[10px]">ความสำเร็จ</div>
                                </div>
                            </div>
                            
                            <h3 className="font-bold text-gray-800 mb-3"><i className="fa-solid fa-clipboard-user text-wood-500"></i> งานของตำแหน่ง</h3>
                            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mb-6">
                                {role.tasks.map((task, idx) => {
                                    const isChecked = checkedTasks[`role_${idx}`];
                                    return (
                                        <div key={idx} onClick={() => toggleCheck(`role_${idx}`)} className={`checkbox-bounce flex items-start p-3 border-b border-gray-50 cursor-pointer ${isChecked ? 'bg-gray-50' : ''}`}>
                                            <div className={`mt-0.5 w-6 h-6 rounded-md flex items-center justify-center mr-3 transition-colors ${isChecked ? role.color + ' text-white' : 'bg-gray-100 border border-gray-300'}`}>
                                                {isChecked && <i className="fa-solid fa-check text-xs"></i>}
                                            </div>
                                            <span className={`text-sm flex-1 ${isChecked ? 'text-gray-400 line-through' : 'text-gray-700'}`}>{task}</span>
                                        </div>
                                    );
                                })}
                            </div>

                            <h3 className="font-bold text-gray-800 mb-3"><i className="fa-solid fa-users text-gray-500"></i> งานส่วนรวม (ช่วยกัน)</h3>
                            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                                {sharedTasks.map((task, idx) => {
                                    const isChecked = checkedTasks[`shared_${idx}`];
                                    const isHighlight = idx >= 5; 
                                    return (
                                        <div key={idx} onClick={() => toggleCheck(`shared_${idx}`)} className={`checkbox-bounce flex items-start p-3 border-b border-gray-50 cursor-pointer ${isChecked ? 'bg-gray-50' : ''}`}>
                                            <div className={`mt-0.5 w-6 h-6 rounded-md flex items-center justify-center mr-3 transition-colors ${isChecked ? 'bg-emerald-500 text-white' : 'bg-gray-100 border border-gray-300'}`}>
                                                {isChecked && <i className="fa-solid fa-check text-xs"></i>}
                                            </div>
                                            <span className={`text-sm flex-1 ${isChecked ? 'text-gray-400 line-through' : (isHighlight ? 'text-gray-800 font-bold' : 'text-gray-700')}`}>{task}</span>
                                        </div>
                                    );
                                })}
                            </div>

                            {/* 🟢 ปุ่มเปิดหน้าต่างเช็คสต็อก */}
                            <div className="mt-6 mb-4">
                                <button 
                                    onClick={() => setIsStockModalOpen(true)}
                                    className="w-full bg-wood-800 hover:bg-wood-900 text-white font-bold py-3.5 rounded-xl shadow-lg transition-transform active:scale-95 flex items-center justify-center gap-2"
                                >
                                    <i className="fa-solid fa-boxes-stacked"></i> บันทึกสต็อกประจำตำแหน่ง
                                </button>
                            </div>

                            {/* 🟢 หน้าต่างป๊อปอัป (Modal) สำหรับกรอกตัวเลขสต็อก */}
                            {isStockModalOpen && (
                                <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-[fadeIn_0.2s_ease-out]">
                                    <div className="bg-white w-full max-w-sm rounded-2xl p-5 shadow-2xl relative max-h-[85vh] flex flex-col">
                                        <button onClick={() => setIsStockModalOpen(false)} className="absolute top-4 right-4 w-8 h-8 flex items-center justify-center bg-gray-100 rounded-full text-gray-500 hover:bg-gray-200">
                                            <i className="fa-solid fa-xmark"></i>
                                        </button>
                                        
                                        <div className="mb-4 pr-6">
                                            <h3 className="text-lg font-bold text-wood-800 flex items-center gap-2">
                                                <i className="fa-solid fa-clipboard-list text-wood-500"></i> นับสต็อกก่อนเลิกงาน
                                            </h3>
                                            <p className="text-xs text-gray-500 mt-1">หน้าที่: {role.title}</p>
                                        </div>
                                        
                                        <div className="overflow-y-auto flex-1 mb-4 space-y-2 pr-2 hide-scrollbar">
                                            {role.stockItems && role.stockItems.map((itemName, idx) => (
                                                <div key={idx} className="flex justify-between items-center bg-gray-50 p-2.5 rounded-xl border border-gray-100">
                                                    <span className="text-sm text-gray-700 flex-1">{itemName}</span>
                                                    <input 
                                                        type="number" 
                                                        min="0"
                                                        placeholder="0"
                                                        value={stockInput[itemName] || ''}
                                                        onChange={(e) => setStockInput({...stockInput, [itemName]: e.target.value})}
                                                        className="w-20 text-center border border-gray-300 rounded-lg py-1.5 px-2 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-wood-500 bg-white"
                                                    />
                                                </div>
                                            ))}
                                        </div>
                                        
                                        <button 
                                            onClick={handleStockSubmit}
                                            disabled={isSendingStock}
                                            className="w-full bg-emerald-500 hover:bg-emerald-600 disabled:bg-gray-300 text-white font-bold py-3.5 rounded-xl shadow-md transition-colors flex items-center justify-center gap-2"
                                        >
                                            {isSendingStock ? (
                                                <><i className="fa-solid fa-spinner fa-spin"></i> กำลังส่งข้อมูล...</>
                                            ) : (
                                                <><i className="fa-solid fa-cloud-arrow-up"></i> ยืนยันการส่งสต็อก</>
                                            )}
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    );
                }

                return (
                    <div className="p-4 pb-24">
                        {parseError && (
                            <div className="bg-red-50 border border-red-200 p-3 mb-4 rounded-xl flex items-start gap-3 shadow-sm">
                                <i className="fa-solid fa-circle-exclamation text-red-500 mt-0.5"></i>
                                <div className="text-xs text-red-700">เชื่อมต่อตารางงานล้มเหลว กรุณาเช็ค Google Sheets ว่าเผยแพร่สู่สาธารณะหรือยัง</div>
                            </div>
                        )}
                        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-2 flex justify-between items-center relative">
                            <button onClick={() => changeDate(-1)} className="w-10 h-10 rounded-full hover:bg-wood-50 text-wood-500 flex items-center justify-center"><i className="fa-solid fa-chevron-left"></i></button>
                            <div className="text-center flex-1 relative">
                                <p className="text-[10px] text-gray-400 uppercase tracking-wider mb-0.5">เลือกวันที่</p>
                                <div className="font-bold text-wood-800 text-sm flex items-center justify-center gap-2">
                                    <i className="fa-regular fa-calendar text-wood-400"></i> {formatDateThai(selectedDateStr)}
                                </div>
                                <input type="date" value={selectedDateStr} onChange={(e) => e.target.value && setSelectedDateStr(e.target.value)} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                            </div>
                            <button onClick={() => changeDate(1)} className="w-10 h-10 rounded-full hover:bg-wood-50 text-wood-500 flex items-center justify-center"><i className="fa-solid fa-chevron-right"></i></button>
                        </div>
                        {content}
                    </div>
                );
            };

            // 2. หน้าตารางปฏิทินรวม (แบบออโต้ตามเดือนปัจจุบัน)
            const renderSchedule = () => {
                // คำนวณเดือนและจำนวนวันตามปฏิทินจริง
                const displayDate = new Date(selectedDateStr || getTodayStr());
                const year = displayDate.getFullYear();
                const month = displayDate.getMonth();
                const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
                const monthNameThai = `${monthNames[month]} ${year + 543}`;
                
                const monthPrefix = `${year}-${String(month + 1).padStart(2, '0')}`;
                
                // หาวันแรกของเดือนตรงกับวันอะไรในสัปดาห์ (0 = อาทิตย์)
                const firstDayOfMonth = new Date(year, month, 1).getDay();
                const emptyDays = firstDayOfMonth; 
                
                const daysInMonthCount = getDaysInMonth(year, month + 1);
                const daysInMonth = Array.from({length: daysInMonthCount}, (_, i) => i + 1);

                return (
                    <div className="p-4 pb-24 animate-[fadeIn_0.3s_ease-out]">
                        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-4 text-center">
                            <h2 className="text-lg font-bold text-wood-800">ตารางเวร: {monthNameThai}</h2>
                        </div>
                        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-3">
                            <div className="grid grid-cols-7 gap-1 text-center text-xs font-bold text-gray-400 mb-2 pb-2 border-b border-gray-100">
                                <div className="text-red-400">อา</div><div>จ</div><div>อ</div><div>พ</div><div>พฤ</div><div>ศ</div><div className="text-blue-400">ส</div>
                            </div>
                            <div className="calendar-grid">
                                {Array.from({length: emptyDays}).map((_, i) => <div key={`e-${i}`} className="p-2"></div>)}
                                {daysInMonth.map(day => {
                                    const dateStr = `${monthPrefix}-${day.toString().padStart(2, '0')}`;
                                    const dayData = userSchedule[dateStr] || { status: "unknown" };
                                    const isSelected = dateStr === selectedDateStr;
                                    let bgClass = "bg-gray-50 text-gray-300 border border-dashed border-gray-200"; 
                                    if(dayData.status === "off") bgClass = "bg-red-50 text-red-500 border border-red-200";
                                    else if(dayData.status === "leave") bgClass = "bg-orange-50 text-orange-500 border border-orange-200";
                                    else if(dayData.status === "work" && dayData.roleId) bgClass = rolesData[dayData.roleId].bgLight + " " + rolesData[dayData.roleId].text + " border border-current opacity-80";

                                    return (
                                        <button key={day} onClick={() => { setSelectedDateStr(dateStr); setCurrentTab('daily'); }}
                                            className={`aspect-square rounded-lg flex flex-col items-center justify-center p-1 transition-transform active:scale-90 ${bgClass} ${isSelected ? 'ring-2 ring-wood-800 shadow-md opacity-100' : ''}`}
                                        >
                                            <span className={`text-sm font-bold ${isSelected ? 'text-wood-800' : ''}`}>{day}</span>
                                            {dayData.status === "off" && <span className="text-[8px] font-bold">OFF</span>}
                                            {dayData.status === "leave" && <span className="text-[8px] font-bold">ลา</span>}
                                            {dayData.status === "work" && dayData.roleId && <i className={`fa-solid ${rolesData[dayData.roleId].icon} text-[10px] mt-0.5`}></i>}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                        <div className="mt-4 bg-gray-50 rounded-xl p-4 border border-gray-100 text-xs">
                            <p className="font-bold text-gray-700 mb-2">คำอธิบาย:</p>
                            <div className="grid grid-cols-2 gap-2">
                                <div className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-orange-50 border border-orange-500"></span> หน้าเตาลวก</div>
                                <div className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-emerald-50 border border-emerald-500"></span> หน้าเตาผัด</div>
                                <div className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-pink-50 border border-pink-500"></span> เสิร์ฟ/แคชเชียร์</div>
                                <div className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-sky-50 border border-sky-500"></span> ล้างจาน</div>
                            </div>
                        </div>
                    </div>
                );
            };

            // 3. หน้าลงเวลา GPS + Selfie
            const renderClockIn = () => {
                const savedClockIn = localStorage.getItem(`clockin_${currentUser}_${getTodayStr()}`);

                return (
                    <div className="p-4 pb-24 animate-[fadeIn_0.3s_ease-out]">
                        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-4 text-center relative overflow-hidden">
                            <i className="fa-solid fa-fingerprint absolute -right-4 -bottom-4 text-8xl text-gray-50 opacity-50"></i>
                            <h2 className="text-xl font-bold text-wood-800 mb-2 relative z-10">ระบบลงเวลาเข้างาน</h2>
                            <p className="text-sm text-gray-500 mb-6 relative z-10">ต้องอยู่ในรัศมีร้านเพื่อเซลฟี่ลงเวลา</p>

                            {clockInState === 'idle' && (
                                <div className="relative z-10">
                                    {savedClockIn ? (
                                        <div className="bg-emerald-50 border border-emerald-200 text-emerald-700 p-4 rounded-xl mb-4">
                                            <i className="fa-solid fa-circle-check text-3xl mb-2 text-emerald-500"></i>
                                            <p className="font-bold">ลงเวลาสำเร็จแล้ว</p>
                                            <p className="text-sm">เวลาเข้างาน: {savedClockIn}</p>
                                        </div>
                                    ) : (
                                        <button onClick={startClockInProcess} className="bg-emerald-500 hover:bg-emerald-600 text-white font-bold text-lg py-4 px-8 rounded-full shadow-lg transition-transform active:scale-95 flex items-center justify-center gap-3 mx-auto">
                                            <i className="fa-solid fa-location-dot"></i> เริ่มลงเวลา
                                        </button>
                                    )}
                                </div>
                            )}

                            {clockInState === 'checking_gps' && (
                                <div className="py-8 relative z-10">
                                    <i className="fa-solid fa-location-crosshairs fa-spin text-4xl text-emerald-500 mb-4"></i>
                                    <p className="font-bold text-gray-700">กำลังตรวจสอบพิกัด GPS...</p>
                                </div>
                            )}

                            {clockInState === 'gps_error' && (
                                <div className="relative z-10">
                                    <div className="bg-red-50 border border-red-200 text-red-700 p-4 rounded-xl mb-4">
                                        <i className="fa-solid fa-circle-xmark text-3xl mb-2 text-red-500"></i>
                                        <p className="font-bold mb-1">ข้อผิดพลาด</p>
                                        <p className="text-sm">{gpsErrorMsg}</p>
                                    </div>
                                    <button onClick={() => setClockInState('idle')} className="bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2 px-6 rounded-lg transition-colors">ลองใหม่อีกครั้ง</button>
                                </div>
                            )}

                            {clockInState === 'camera_ready' && (
                                <div className="relative z-10 flex flex-col items-center">
                                    <div className="w-64 h-80 mb-4 bg-gray-900 shadow-inner rounded-2xl overflow-hidden border-4 border-emerald-500 relative">
                                        <video ref={videoRef} autoPlay playsInline muted className="w-full h-full object-cover" style={{ transform: 'scaleX(-1)' }}></video>
                                        <div className="absolute bottom-4 left-0 right-0 flex justify-center">
                                            <button onClick={captureAndSendToLine} className="w-16 h-16 bg-white rounded-full border-4 border-gray-300 shadow-lg flex items-center justify-center transition-transform active:scale-90 hover:bg-gray-100">
                                                <div className="w-12 h-12 bg-emerald-500 rounded-full"></div>
                                            </button>
                                        </div>
                                    </div>
                                    <p className="font-bold text-gray-700 text-sm">กดปุ่มสีเขียวเพื่อถ่ายเซลฟี่ส่งเข้า LINE</p>
                                </div>
                            )}

                            {clockInState === 'sending' && (
                                <div className="relative z-10 flex flex-col items-center">
                                    <div className="w-64 h-80 mb-4 bg-gray-200 rounded-2xl overflow-hidden border-4 border-orange-400 relative">
                                        {capturedImg && <img src={capturedImg} className="w-full h-full object-cover" style={{ transform: 'scaleX(-1)' }} />}
                                        <div className="absolute inset-0 bg-black/60 flex flex-col items-center justify-center backdrop-blur-sm">
                                            <i className="fa-solid fa-paper-plane fa-bounce text-4xl text-white mb-3"></i>
                                            <p className="font-bold text-white">กำลังส่งเข้า LINE...</p>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {clockInState === 'success' && (
                                <div className="relative z-10 py-4">
                                    <div className="w-20 h-20 bg-emerald-100 text-emerald-500 rounded-full flex items-center justify-center text-4xl mx-auto mb-4 animate-[bounce_0.5s_ease-out]">
                                        <i className="fa-solid fa-check"></i>
                                    </div>
                                    <h3 className="text-xl font-bold text-gray-800">ส่งรูปลงเวลาสำเร็จ!</h3>
                                    <p className="text-gray-500 mt-1">ยินดีต้อนรับเข้าสู่งานครับ/ค่ะ</p>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            // 4. หน้ากติกา
            const renderRules = () => (
                <div className="p-4 pb-24 animate-[fadeIn_0.3s_ease-out]">
                    <div className="bg-wood-800 text-white p-5 rounded-2xl shadow-md text-center mb-4 relative overflow-hidden">
                        <i className="fa-solid fa-scale-balanced absolute -right-4 -bottom-4 text-7xl opacity-10"></i>
                        <h2 className="text-lg font-bold relative z-10"><i className="fa-solid fa-triangle-exclamation text-yellow-400 mr-2"></i> กติการ้าน</h2>
                        <p className="text-xs text-wood-200 mt-1 relative z-10">หักจากเบี้ยขยัน เพื่อความเป็นระเบียบ</p>
                    </div>
                    <div className="space-y-2">
                        {rulesList.map((rule, idx) => (
                            <div key={idx} className="bg-white p-3.5 rounded-xl shadow-sm border border-gray-100 flex flex-col gap-1">
                                <div className="text-sm text-gray-800 font-medium"><span className="text-red-500 font-bold mr-2">{idx + 1}.</span>{rule.text}</div>
                                <div className="flex items-center justify-between pl-6 mt-1">
                                    <span className="text-xs text-gray-400">{rule.note}</span>
                                    <span className="bg-red-50 text-red-600 text-[11px] font-bold px-2 py-0.5 rounded">{rule.penalty}</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            // 5. หน้าผู้ช่วย AI
            const renderAiAssistant = () => (
                <div className="p-4 pb-24 animate-[fadeIn_0.3s_ease-out] flex flex-col min-h-[calc(100vh-80px)]">
                    <div className="bg-gradient-to-r from-amber-500 to-orange-500 text-white p-5 rounded-2xl shadow-md mb-4 relative overflow-hidden">
                        <i className="fa-solid fa-wand-magic-sparkles absolute -right-2 -bottom-2 text-7xl opacity-20"></i>
                        <h2 className="text-lg font-bold relative z-10">เจ๊ผู้ช่วย AI ✨</h2>
                        <p className="text-xs text-orange-100 mt-1 relative z-10">ช่วยคิดวิธีพูดแก้ปัญหาเฉพาะหน้ากับลูกค้า</p>
                    </div>

                    <div className="flex-1 flex flex-col">
                        <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-4">
                            <p className="text-sm text-gray-600 mb-3 font-medium">เลือกสถานการณ์ที่เจอบ่อย:</p>
                            <div className="grid grid-cols-2 gap-2 mb-4">
                                <button onClick={() => generateAiResponse("ลูกค้าบ่นว่าได้อาหารช้ามาก")} className="text-xs bg-orange-50 hover:bg-orange-100 text-orange-700 border border-orange-200 py-2 px-2 rounded-lg transition-colors text-left flex items-center gap-2"><i className="fa-solid fa-clock text-orange-400"></i> ลูกค้าบ่นได้ช้า</button>
                                <button onClick={() => generateAiResponse("ลืมทำออเดอร์ลูกค้า")} className="text-xs bg-pink-50 hover:bg-pink-100 text-pink-700 border border-pink-200 py-2 px-2 rounded-lg transition-colors text-left flex items-center gap-2"><i className="fa-solid fa-receipt text-pink-400"></i> ลืมทำออเดอร์</button>
                            </div>
                            <p className="text-sm text-gray-600 mb-2 font-medium">หรือพิมพ์ปัญหาของคุณ:</p>
                            <div className="flex gap-2">
                                <input type="text" value={aiInput} onChange={(e) => setAiInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && generateAiResponse()} placeholder="เช่น ลูกค้าบอกซุปเค็มไป..." className="flex-1 border border-gray-200 bg-gray-50 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400" />
                                <button onClick={() => generateAiResponse()} disabled={isAiLoading || (!aiInput.trim())} className="bg-wood-700 hover:bg-wood-800 disabled:bg-gray-300 text-white w-10 h-10 rounded-xl flex items-center justify-center transition-colors"><i className="fa-solid fa-paper-plane"></i></button>
                            </div>
                        </div>

                        {(isAiLoading || aiResponse) && (
                            <div className="bg-white rounded-xl shadow-sm border border-orange-200 p-4 relative mb-4">
                                <div className="absolute -top-3 -left-2 text-2xl">👩🏻‍🍳</div>
                                <p className="text-xs font-bold text-orange-600 mb-2 ml-4">คำแนะนำจากเจ๊ AI:</p>
                                {isAiLoading ? (
                                    <div className="flex items-center gap-2 text-gray-500 text-sm ml-4 py-2"><i className="fa-solid fa-circle-notch fa-spin text-orange-400"></i> เจ๊กำลังคิดคำพูดให้นะ...</div>
                                ) : (
                                    <div className="text-sm text-gray-700 prose prose-sm ml-4" dangerouslySetInnerHTML={{ __html: marked.parse(aiResponse) }}></div>
                                )}
                            </div>
                        )}
                        <div ref={aiEndRef}></div>
                    </div>
                </div>
            );

            // ==========================================
            // Main Render
            // ==========================================
            return (
                <div className="app-container">
                    <header className="bg-white pt-6 pb-3 px-5 rounded-b-2xl shadow-sm sticky top-0 z-20 flex justify-between items-center border-b border-gray-100">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-wood-100 rounded-full flex items-center justify-center text-wood-600 font-bold text-lg shadow-inner">{currentUser.charAt(0)}</div>
                            <div>
                                <p className="text-[10px] text-gray-500 leading-none mb-1">สวัสดีครับ/ค่ะ</p>
                                <h1 className="text-base font-bold text-wood-800 leading-none">{currentUser}</h1>
                            </div>
                        </div>
                        <button onClick={() => {if(confirm('ต้องการสลับบัญชีใช่หรือไม่?')) setCurrentUser(null)}} className="bg-gray-50 hover:bg-gray-100 text-gray-500 px-3 py-1.5 rounded-lg text-xs font-medium border border-gray-200">
                            <i className="fa-solid fa-users mr-1"></i> สลับคน
                        </button>
                    </header>

                    <main>
                        {currentTab === 'daily' && renderDaily()}
                        {currentTab === 'schedule' && renderSchedule()}
                        {currentTab === 'clockin' && renderClockIn()}
                        {currentTab === 'rules' && renderRules()}
                        {currentTab === 'ai' && renderAiAssistant()}
                    </main>

                    <nav className="fixed bottom-0 w-full max-w-[480px] bg-white border-t border-gray-100 pb-safe pt-2 px-1 flex justify-between items-center shadow-[0_-10px_20px_rgba(0,0,0,0.03)] z-30">
                        <button onClick={() => setCurrentTab('daily')} className={`flex-1 flex flex-col items-center p-2 transition-all ${currentTab === 'daily' ? 'text-wood-700 scale-110' : 'text-gray-400 hover:text-wood-400'}`}>
                            <div className="text-xl mb-1"><i className="fa-solid fa-clipboard-check"></i></div><span className="text-[9px] font-medium whitespace-nowrap">งานวันนี้</span>
                        </button>
                        <button onClick={() => setCurrentTab('schedule')} className={`flex-1 flex flex-col items-center p-2 transition-all ${currentTab === 'schedule' ? 'text-wood-700 scale-110' : 'text-gray-400 hover:text-wood-400'}`}>
                            <div className="text-xl mb-1"><i className="fa-solid fa-calendar-days"></i></div><span className="text-[9px] font-medium whitespace-nowrap">ตารางเวร</span>
                        </button>
                        <button onClick={() => setCurrentTab('clockin')} className={`flex-1 flex flex-col items-center p-2 transition-all ${currentTab === 'clockin' ? 'text-emerald-500 scale-110' : 'text-gray-400 hover:text-emerald-500'}`}>
                            <div className="text-2xl mb-1"><i className="fa-solid fa-fingerprint"></i></div><span className="text-[9px] font-bold whitespace-nowrap">ลงเวลา</span>
                        </button>
                        <button onClick={() => setCurrentTab('rules')} className={`flex-1 flex flex-col items-center p-2 transition-all ${currentTab === 'rules' ? 'text-wood-700 scale-110' : 'text-gray-400 hover:text-wood-400'}`}>
                            <div className="text-xl mb-1"><i className="fa-solid fa-book-open"></i></div><span className="text-[9px] font-medium whitespace-nowrap">กติกา</span>
                        </button>
                        <button onClick={() => setCurrentTab('ai')} className={`flex-1 flex flex-col items-center p-2 transition-all ${currentTab === 'ai' ? 'text-orange-500 scale-110' : 'text-gray-400 hover:text-orange-400'}`}>
                            <div className="text-xl mb-1"><i className="fa-solid fa-wand-magic-sparkles"></i></div><span className="text-[9px] font-medium whitespace-nowrap">ผู้ช่วย AI</span>
                        </button>
                    </nav>
                    <div className="h-6 bg-white fixed bottom-0 w-full max-w-[480px] z-20" style={{paddingBottom: 'env(safe-area-inset-bottom)'}}></div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
